<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — NeatNest Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F8F5F0;
      --brown: #5C4A32;
      --sage:  #7A9E7E;
      --warm:  #EDE8DF;
      --text:  #2D2520;
      --muted: #7A6A5A;
      --error: #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--warm) 0%, var(--cream) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(92,74,50,.15);
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--brown);
    }
    .login-logo p { font-size: .85rem; color: var(--muted); margin-top: .25rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--brown);
      margin-bottom: .4rem;
      letter-spacing: .02em;
    }
    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--warm);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      background: var(--cream);
      color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,158,126,.15);
    }
    .input-wrap { position: relative; }
    .toggle-pw {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      padding: .2rem;
      line-height: 1;
    }
    .btn-login {
      width: 100%;
      padding: .85rem;
      background: var(--brown);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: .5rem;
    }
    .btn-login:hover  { background: var(--sage); }
    .btn-login:active { transform: scale(.98); }
    .error-msg {
      display: none;
      background: #fdf0ef;
      border: 1.5px solid #e8aea9;
      border-radius: 8px;
      color: var(--error);
      font-size: .875rem;
      padding: .75rem 1rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .error-msg.show { display: block; }
    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .login-footer a { color: var(--brown); text-decoration: none; }
    .shake { animation: shake .4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
  </style>
</head>
<body>

<div class="login-card" id="loginCard">
  <div class="login-logo">
    <span class="icon">🏡</span>
    <h1>NeatNest Admin</h1>
    <p>Owner access only</p>
  </div>

  <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password" required />
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁️</button>
      </div>
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>

  <div class="login-footer">
    <a href="../index.html">← Back to NeatNest Home</a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('neatnest_admin_auth') === 'true') {
    window.location.href = 'dashboard.html';
  }

  const CREDS = { user: 'neatnest', pass: 'NeatNest2026!' };

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    const card = document.getElementById('loginCard');

    if (u === CREDS.user && p === CREDS.pass) {
      sessionStorage.setItem('neatnest_admin_auth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; // reflow to restart animation
      card.classList.add('shake');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });

  // Toggle password visibility
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    if (pw.type === 'password') { pw.type = 'text'; this.textContent = '🙈'; }
    else { pw.type = 'password'; this.textContent = '👁️'; }
  });

  // Clear error on input
  ['username','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorMsg').classList.remove('show');
    });
  });
</script>
</body>
</html>
